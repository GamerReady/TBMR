<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>TuBoletinMercantil | Portal Corporativo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=eH_J_ZBn8wc4h3T0h2-0UmU0Vola0b9NUhvWElwS2OEzqaMXcFPwHmgAHe-O0ru5BMiOAZIwwBhN9QI-kW1Zng" charset="UTF-8"></script>
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #2563eb;
            --accent: #3b82f6;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-soft: #e2e8f0;
            --header-height: 80px;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .corporate-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-soft);
            position: fixed;
            top: 0;
            width: 100%;
            height: var(--header-height);
            z-index: 1050;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .navbar-corporate {
            width: 100%;
            padding: 0 2rem;
        }

        .logo-container img {
            height: 44px;
            border-radius: 8px;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .logo-container:hover img {
            transform: scale(1.02);
        }

        .btn-biblioteca {
            background: rgba(37, 99, 235, 0.1);
            color: var(--secondary);
            border: 1px solid rgba(37, 99, 235, 0.2);
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-biblioteca:hover {
            background: var(--secondary);
            color: #ffffff;
            border-color: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .main-container {
            margin-top: var(--header-height);
            height: calc(100vh - var(--header-height));
            flex: 1;
        }

        .layout-row {
            height: 100%;
            margin: 0;
        }

        .carousel-panel {
            padding: 0;
            height: 100%;
            position: relative;
            background-color: var(--primary);
            overflow: hidden;
        }

        .video-carousel-container {
            height: 100%;
            width: 100%;
            position: relative;
        }

        .video-carousel {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
            transition: opacity 0.5s ease;
        }

        .controls-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(15, 23, 42, 0.9), transparent);
            pointer-events: none;
            z-index: 2;
        }

        .media-badge {
            position: absolute;
            top: 2rem;
            left: 2rem;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            color: #ffffff;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            z-index: 3;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .carousel-controls {
            position: absolute;
            bottom: 3rem;
            left: 3rem;
            z-index: 10;
            display: flex;
            gap: 1rem;
        }

        .carousel-control {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .carousel-control:hover {
            background: #ffffff;
            color: var(--primary);
            transform: scale(1.05);
        }

        .carousel-indicators {
            position: absolute;
            bottom: 3rem;
            right: 3rem;
            z-index: 10;
            display: flex;
            gap: 0.8rem;
            margin: 0;
        }

        .carousel-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            padding: 0;
        }

        .carousel-indicator.active {
            background: #ffffff;
            width: 24px;
            border-radius: 4px;
        }

        .video-controls {
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1rem;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
        }

        .carousel-panel:hover .video-controls {
            opacity: 1;
            transform: translate(-50%, -10px);
        }

        .video-control-btn {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .video-control-btn:hover {
            background: var(--secondary);
            border-color: var(--secondary);
        }

        .login-panel {
            background: var(--bg-body);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        .login-panel::before {
            content: '';
            position: absolute;
            top: -10%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(37,99,235,0.1) 0%, rgba(248,250,252,0) 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .login-card {
            background: var(--bg-card);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.6);
            width: 100%;
            max-width: 420px;
            z-index: 1;
            overflow: hidden;
        }

        .card-header-custom {
            padding: 2.5rem 2.5rem 1rem;
            text-align: center;
        }

        .card-header-custom h4 {
            color: var(--text-main);
            font-weight: 800;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .card-header-custom p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0;
        }

        .card-body {
            padding: 1.5rem 2.5rem 2.5rem;
        }

        .form-label {
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.6rem;
        }

        .input-group {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid var(--border-soft);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .input-group:focus-within {
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .input-group-text {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding-left: 1.2rem;
            padding-right: 0.5rem;
        }

        .form-control {
            border: none;
            background: transparent;
            padding: 0.8rem 1rem 0.8rem 0.5rem;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .form-control:focus {
            box-shadow: none;
            background: transparent;
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .btn-login {
            background: var(--secondary);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .btn-outline-primary-custom {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            padding: 0.8rem;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-outline-primary-custom:hover {
            background: var(--bg-body);
            border-color: #cbd5e1;
            color: var(--primary);
        }

        .forgot-password {
            color: var(--secondary);
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s;
        }

        .forgot-password:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        .card-footer-custom {
            text-align: center;
            padding: 1.5rem;
            background: rgba(248, 250, 252, 0.5);
            border-top: 1px solid var(--border-soft);
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
        }

        .loader-container {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            z-index: 10;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(37, 99, 235, 0.2);
            border-top: 3px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        .loader-text {
            color: var(--primary);
            font-weight: 600;
            font-size: 0.95rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 991.98px) {
            .carousel-panel {
                display: none;
            }
            .login-panel {
                padding: 1.5rem;
                background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            }
            .login-card {
                max-width: 100%;
                box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            }
            .navbar-corporate {
                padding: 0 1rem;
            }
        }

        @media (max-width: 575.98px) {
            .card-header-custom {
                padding: 2rem 1.5rem 0.5rem;
            }
            .card-body {
                padding: 1.5rem;
            }
            :root {
                --header-height: 70px;
            }
            .btn-biblioteca span {
                display: none;
            }
        }
    </style>
</head>
<body>

    <header class="corporate-header">
        <nav class="navbar navbar-expand-lg navbar-corporate">
            <div class="logo-container">
                <img src="/Content/Imagenes/LogoTuBoletinMercantilSF.jpg" alt="TuBoletinMercantil" />
            </div>
            <div class="ms-auto">
                <a href="/Biblioteca" class="btn-biblioteca text-decoration-none">
                    <i class="fas fa-book-open"></i> <span>Biblioteca Digital</span>
                </a>
            </div>
        </nav>
    </header>

    <div class="main-container">
        <div class="row layout-row">
            <div class="col-lg-7 col-xl-8 d-none d-lg-block carousel-panel">
                <div id="videoCarousel" class="carousel slide h-100" data-bs-ride="carousel" data-bs-interval="false">
                    <div class="carousel-indicators" id="carouselIndicators"></div>
                    <div class="carousel-inner h-100" id="carouselItems"></div>
                    <div class="controls-gradient"></div>
                    <div class="carousel-controls">
                        <button class="carousel-control" onclick="prevVideo()">
                            <i class="fas fa-arrow-left"></i>
                        </button>
                        <button class="carousel-control" onclick="nextVideo()">
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-5 col-xl-4 login-panel">
                <div class="login-card">
                    <div class="card-header-custom">
                        <h4>Bienvenido</h4>
                        <p>Acceso exclusivo para clientes</p>
                    </div>

                    <div class="card-body">
                        <form action="/" method="post" autocomplete="off" onsubmit="return mostrarLoaderLogin()">
                            <div class="mb-4">
                                <label class="form-label">Correo Electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                    <input class="form-control" name="correo" type="email" placeholder="ejemplo@empresa.com" required />
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input class="form-control" name="clave" type="password" placeholder="••••••••" required />
                                </div>
                                <div class="text-end mt-2">
                                    <a href="/Acceso/Reestablecer" class="forgot-password">¿Olvidó su contraseña?</a>
                                </div>
                            </div>

                            <button type="submit" class="btn-login" id="btn-login">
                                Iniciar Sesión <i class="fas fa-arrow-right ms-1"></i>
                            </button>

                            <div class="text-center mt-4 pt-3 border-top">
                                <p class="text-muted mb-3 fs-6">¿Aún no tiene acceso?</p>
                                <a href="/Acceso/Registrar" class="btn-outline-primary-custom" id="btnCrearCuenta">
                                    <i class="fas fa-user-plus"></i> Solicitar cuenta nueva
                                </a>
                            </div>
                        </form>
                    </div>

                    <div class="loader-container" id="login-loader">
                        <div class="loader-spinner"></div>
                        <span class="loader-text">Validando credenciales...</span>
                    </div>

                    <div class="card-footer-custom">
                        <i class="fas fa-shield-halved me-1"></i> &copy; 2026 TuBoletinMercantil.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    const mediaFiles = [
        {
            type: 'video',
            src: '/Assets/Videos/carrusel1.mp4',
            fallback: '/Assets/Imagenes/carrusel1.jpg',
            title: 'Servicios Corporativos',
            badge: 'Servicios'
        },
        {
            type: 'video',
            src: '/Assets/Videos/carrusel2.mp4',
            fallback: '/Assets/Imagenes/carrusel2.jpg',
            title: 'Información Mercantil',
            badge: 'Corporativo'
        }
    ];

    let currentVideoIndex = 0;
    let videoElements = [];
    let autoSlideInterval;

    function createCarousel() {
        const carouselItems = document.getElementById('carouselItems');
        const carouselIndicators = document.getElementById('carouselIndicators');

        mediaFiles.forEach((media, index) => {
            const item = document.createElement('div');
            item.className = `carousel-item h-100 ${index === 0 ? 'active' : ''}`;
            item.id = `carousel-item-${index}`;

            const mediaContainer = document.createElement('div');
            mediaContainer.className = 'video-carousel-container';

            if (media.type === 'video') {
                const video = document.createElement('video');
                video.className = 'video-carousel';
                video.autoplay = index === 0;
                video.muted = true;
                video.loop = false;
                video.playsInline = true;
                video.id = `video-${index}`;

                const source = document.createElement('source');
                source.src = media.src;
                source.type = 'video/mp4';

                const fallback = document.createElement('img');
                fallback.src = media.fallback;
                fallback.className = 'video-carousel';
                fallback.style.display = 'none';
                fallback.alt = media.title;

                video.appendChild(source);
                video.appendChild(fallback);
                mediaContainer.appendChild(video);

                const controls = document.createElement('div');
                controls.className = 'video-controls';
                controls.innerHTML = `
                    <button class="video-control-btn" onclick="togglePlayPause(${index})">
                        <i class="fas fa-play" id="play-icon-${index}"></i>
                    </button>
                    <button class="video-control-btn" onclick="toggleMute(${index})">
                        <i class="fas fa-volume-up" id="mute-icon-${index}"></i>
                    </button>
                `;
                mediaContainer.appendChild(controls);

                const badge = document.createElement('div');
                badge.className = 'media-badge';
                badge.innerHTML = media.badge;
                mediaContainer.appendChild(badge);

                videoElements.push(video);

                video.addEventListener('ended', () => {
                    nextVideo();
                });
            } else {
                const img = document.createElement('img');
                img.src = media.src;
                img.className = 'video-carousel';
                img.alt = media.title;
                mediaContainer.appendChild(img);

                const badge = document.createElement('div');
                badge.className = 'media-badge';
                badge.innerHTML = media.badge;
                mediaContainer.appendChild(badge);
            }

            item.appendChild(mediaContainer);
            carouselItems.appendChild(item);

            const indicator = document.createElement('div');
            indicator.className = `carousel-indicator ${index === 0 ? 'active' : ''}`;
            indicator.onclick = () => goToSlide(index);
            carouselIndicators.appendChild(indicator);
        });
    }

    function nextVideo() {
        const currentIndex = currentVideoIndex;
        const nextIndex = (currentVideoIndex + 1) % mediaFiles.length;

        if (mediaFiles[currentIndex].type === 'video') {
            const currentVideo = document.getElementById(`video-${currentIndex}`);
            if (currentVideo) {
                currentVideo.pause();
                currentVideo.currentTime = 0;
            }
        }

        document.querySelector(`#carousel-item-${currentIndex}`).classList.remove('active');
        document.querySelector(`#carousel-item-${nextIndex}`).classList.add('active');

        document.querySelectorAll('.carousel-indicator').forEach((indicator, index) => {
            indicator.classList.toggle('active', index === nextIndex);
        });

        if (mediaFiles[nextIndex].type === 'video') {
            const nextVideoObj = document.getElementById(`video-${nextIndex}`);
            if (nextVideoObj) {
                setTimeout(() => {
                    nextVideoObj.play().catch(e => console.log(e));
                    updatePlayIcon(nextIndex, true);
                }, 500);
            }
        }

        currentVideoIndex = nextIndex;
        resetAutoSlide();
    }

    function prevVideo() {
        const currentIndex = currentVideoIndex;
        const prevIndex = (currentVideoIndex - 1 + mediaFiles.length) % mediaFiles.length;

        if (mediaFiles[currentIndex].type === 'video') {
            const currentVideo = document.getElementById(`video-${currentIndex}`);
            if (currentVideo) {
                currentVideo.pause();
                currentVideo.currentTime = 0;
            }
        }

        document.querySelector(`#carousel-item-${currentIndex}`).classList.remove('active');
        document.querySelector(`#carousel-item-${prevIndex}`).classList.add('active');

        document.querySelectorAll('.carousel-indicator').forEach((indicator, index) => {
            indicator.classList.toggle('active', index === prevIndex);
        });

        if (mediaFiles[prevIndex].type === 'video') {
            const prevVideoObj = document.getElementById(`video-${prevIndex}`);
            if (prevVideoObj) {
                setTimeout(() => {
                    prevVideoObj.play().catch(e => console.log(e));
                    updatePlayIcon(prevIndex, true);
                }, 500);
            }
        }

        currentVideoIndex = prevIndex;
        resetAutoSlide();
    }

    function goToSlide(index) {
        const currentIndex = currentVideoIndex;

        if (mediaFiles[currentIndex].type === 'video') {
            const currentVideo = document.getElementById(`video-${currentIndex}`);
            if (currentVideo) {
                currentVideo.pause();
                currentVideo.currentTime = 0;
            }
        }

        document.querySelector(`#carousel-item-${currentIndex}`).classList.remove('active');
        document.querySelector(`#carousel-item-${index}`).classList.add('active');

        document.querySelectorAll('.carousel-indicator').forEach((indicator, i) => {
            indicator.classList.toggle('active', i === index);
        });

        if (mediaFiles[index].type === 'video') {
            const video = document.getElementById(`video-${index}`);
            if (video) {
                setTimeout(() => {
                    video.play().catch(e => console.log(e));
                    updatePlayIcon(index, true);
                }, 500);
            }
        }

        currentVideoIndex = index;
        resetAutoSlide();
    }

    function togglePlayPause(index) {
        const video = document.getElementById(`video-${index}`);
        const icon = document.getElementById(`play-icon-${index}`);

        if (video.paused) {
            video.play();
            icon.className = 'fas fa-pause';
        } else {
            video.pause();
            icon.className = 'fas fa-play';
        }
    }

    function updatePlayIcon(index, isPlaying) {
        const icon = document.getElementById(`play-icon-${index}`);
        if (icon) {
            icon.className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
        }
    }

    function toggleMute(index) {
        const video = document.getElementById(`video-${index}`);
        const icon = document.getElementById(`mute-icon-${index}`);

        video.muted = !video.muted;
        icon.className = video.muted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
    }

    function resetAutoSlide() {
        clearInterval(autoSlideInterval);
        if (mediaFiles.some(media => media.type === 'image')) {
            autoSlideInterval = setInterval(() => {
                nextVideo();
            }, 8000);
        }
    }

    function setupVideoEvents() {
        videoElements.forEach((video, index) => {
            video.addEventListener('play', () => updatePlayIcon(index, true));
            video.addEventListener('pause', () => updatePlayIcon(index, false));
        });
    }

    function adjustVideoSize() {
        const videos = document.querySelectorAll('.video-carousel');
        const container = document.querySelector('.carousel-panel');

        if (!container || videos.length === 0) return;

        const containerWidth = container.clientWidth;
        const containerHeight = container.clientHeight;
        const containerRatio = containerWidth / containerHeight;
        const videoRatio = 16 / 9;

        videos.forEach(video => {
            if (video.tagName === 'VIDEO' || video.tagName === 'IMG') {
                if (containerRatio > videoRatio) {
                    video.style.width = '100%';
                    video.style.height = 'auto';
                    video.style.minHeight = '100%';
                } else {
                    video.style.width = 'auto';
                    video.style.height = '100%';
                    video.style.minWidth = '100%';
                }
            }
        });
    }

    document.addEventListener('DOMContentLoaded', function () {
        createCarousel();
        setupVideoEvents();

        setTimeout(adjustVideoSize, 100);
        window.addEventListener('resize', adjustVideoSize);

        if (mediaFiles[0] && mediaFiles[0].type === 'video') {
            const firstVideo = document.getElementById('video-0');
            if (firstVideo) {
                setTimeout(() => {
                    firstVideo.play().catch(e => {
                        const controls = firstVideo.parentElement.querySelector('.video-controls');
                        if (controls) controls.style.opacity = '1';
                    });
                }, 1000);
            }
        }

        resetAutoSlide();
        initRegistroCorreo();
    });

    function mostrarLoaderLogin() {
        const loader = document.getElementById("login-loader");
        const btn = document.getElementById("btn-login");

        loader.style.display = "flex";
        btn.disabled = true;

        setTimeout(() => {
            if (loader.style.display !== "none") {
                loader.style.display = "none";
                btn.disabled = false;
            }
        }, 15000);

        return true;
    }

    function initRegistroCorreo() {
        const crearCuentaBtn = document.getElementById('btnCrearCuenta');
        const correoInput = document.querySelector('input[name="correo"]');

        if (crearCuentaBtn && correoInput) {
            crearCuentaBtn.addEventListener('click', function (e) {
                const correo = correoInput.value.trim();
                if (correo) {
                    sessionStorage.setItem('correoRegistro', correo);
                }
            });
        }
    }
    </script>
</body>
</html>
